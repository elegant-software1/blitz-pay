openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:63182
  description: Generated server url
tags:
- name: Braintree
  description: PayPal / digital wallet payments via Braintree
- name: Stripe
  description: Card payment session creation via Stripe
- name: Invoices
  description: EU-standard ZUGFeRD / Factur-X invoice generation
- name: Merchant Onboarding
  description: Endpoints for merchant onboarding and lifecycle
- name: Payment Status
  description: Fallback query for authoritative payment status
- name: Device Registration
  description: Expo push token registration for payment status notifications
- name: Actuator
  description: Monitor and interact
  externalDocs:
    description: Spring Boot Actuator Web API Documentation
    url: https://docs.spring.io/spring-boot/docs/current/actuator-api/html/
- name: Merchant Location
  description: Geolocation and geofencing for merchants
- name: Merchant Products
  description: Product catalog management for merchants
- name: Merchant Branches
  description: Manage branches under a merchant
- name: QR Payments
  description: Operations related to QR payments
paths:
  /{version}/merchants/{merchantId}/products/{productId}:
    get:
      tags:
      - Merchant Products
      summary: Get a single active product
      operationId: get
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: productId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: branchId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
    put:
      tags:
      - Merchant Products
      summary: "Update a product's name, price, and image"
      operationId: update
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: productId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                branchId:
                  type: string
                unitPrice:
                  type: string
                description:
                  type: string
                image:
                  type: string
                  format: binary
              required:
              - name
              - unitPrice
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
    delete:
      tags:
      - Merchant Products
      summary: Soft-delete a product (sets active = false)
      operationId: deactivate
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: productId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: branchId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
  /{version}/merchants/{merchantId}/location:
    get:
      tags:
      - Merchant Location
      summary: Get a merchant's current location
      description: Returns 404 if the merchant has no location set.
      operationId: getLocation
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MerchantLocationResponse"
    put:
      tags:
      - Merchant Location
      summary: Set or update a merchant's location and geofence radius
      description: Idempotent — replaces any existing location. geofenceRadiusMeters
        must be > 0. googlePlaceId is optional and used to correlate with Google Maps.
      operationId: setLocation
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetMerchantLocationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MerchantLocationResponse"
    delete:
      tags:
      - Merchant Location
      summary: Remove a merchant's location
      description: "Clears latitude, longitude, geofence radius, and googlePlaceId.\
        \ Returns 204 on success."
      operationId: deleteLocation
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
  /{version}/merchants/{id}/logo:
    put:
      tags:
      - Merchant Onboarding
      summary: Set merchant logo
      description: "Records the S3 storage key of a logo already uploaded by the client.\
        \ Expected key format: merchant/{applicationId}/logo.{ext}"
      operationId: setLogo
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetLogoRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MerchantSummary"
  /{version}/webhooks/truelayer:
    post:
      tags:
      - tl-webhook-controller
      operationId: receive
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /{version}/payments/stripe/create-intent:
    post:
      tags:
      - Stripe
      summary: Create a Stripe PaymentIntent and return credentials to the mobile
        SDK.
      operationId: createIntent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /{version}/payments/request:
    post:
      tags:
      - QR Payments
      operationId: createPaymentRequest
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequested"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: string
  /{version}/payments/braintree/client-token:
    post:
      tags:
      - Braintree
      summary: Generate a Braintree client token for the mobile SDK.
      operationId: clientToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientTokenRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /{version}/payments/braintree/checkout:
    post:
      tags:
      - Braintree
      summary: Submit a Braintree payment nonce for settlement.
      operationId: checkout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /{version}/merchants/{merchantId}/products:
    get:
      tags:
      - Merchant Products
      summary: List all active products for the merchant
      operationId: list
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: branchId
        in: query
        required: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      tags:
      - Merchant Products
      summary: Create a product for the merchant
      operationId: create
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                branchId:
                  type: string
                unitPrice:
                  type: string
                description:
                  type: string
                image:
                  type: string
                  format: binary
              required:
              - name
              - unitPrice
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductResponse"
  /{version}/merchants/{merchantId}/branches:
    get:
      tags:
      - Merchant Branches
      summary: List active branches for a merchant
      operationId: list_1
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
    post:
      tags:
      - Merchant Branches
      summary: Create a new branch under a merchant
      operationId: create_1
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /{version}/merchants/{id}/activate:
    post:
      tags:
      - Merchant Onboarding
      summary: Directly activate a merchant application (skips onboarding flow)
      operationId: activate
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MerchantSummary"
  /{version}/merchants:
    post:
      tags:
      - Merchant Onboarding
      summary: "Register a new merchant (directly ACTIVE, duplicate registration number\
        \ rejected with 409)"
      operationId: create_2
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMerchantRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MerchantSummary"
  /{version}/invoices/pdf:
    post:
      tags:
      - Invoices
      summary: Generate ZUGFeRD PDF invoice
      description: Returns a human-readable PDF/A-3 with embedded ZUGFeRD XML.
      operationId: generatePdf
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceData"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/pdf:
              schema:
                type: string
                format: byte
  /{version}/invoices:
    post:
      tags:
      - Invoices
      summary: Generate ZUGFeRD XML invoice
      description: "Returns a ZUGFeRD 2.0 / Factur-X compliant XML document. Send\
        \ Accept: application/xml."
      operationId: generateXml
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceData"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/xml:
              schema:
                type: string
                format: byte
  /{version}/devices:
    post:
      tags:
      - Device Registration
      summary: Register or refresh a push token against a payment request.
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceRegistrationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DeviceRegistrationResponse"
  /{version}/qr-payments/{paymentRequestId}/events:
    get:
      tags:
      - qr-payment-sse-controller
      operationId: stream
      parameters:
      - name: paymentRequestId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            text/event-stream:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServerSentEventPaymentResult"
  /{version}/payments/{paymentRequestId}:
    get:
      tags:
      - Payment Status
      summary: Fetch the authoritative current status of a payment request.
      operationId: getPaymentStatus
      parameters:
      - name: paymentRequestId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PaymentStatusResponse"
  /{version}/merchants/{merchantId}/branches/{branchId}:
    get:
      tags:
      - Merchant Branches
      summary: Get a branch by ID
      operationId: get_1
      parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: branchId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /{version}/merchants/{id}:
    get:
      tags:
      - Merchant Onboarding
      summary: Get merchant application details
      operationId: get_2
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MerchantSummary"
  /{version}/merchants/nearby:
    get:
      tags:
      - Merchant Location
      summary: Find merchants near a position
      description: "Returns merchants whose store location falls within radiusMeters\
        \ of (lat, lng). Intended for mobile geofence-enter events. Default search\
        \ radius is 500 m. Results are ordered by ascending distance. Only merchants\
        \ with a location set are returned."
      operationId: findNearby
      parameters:
      - name: lat
        in: query
        required: true
        schema:
          type: number
          format: double
      - name: lng
        in: query
        required: true
        schema:
          type: number
          format: double
      - name: radiusMeters
        in: query
        required: false
        schema:
          type: number
          format: double
          default: 500.0
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/NearbyMerchantsResponse"
  /actuator/metrics/{requiredMetricName}:
    get:
      tags:
      - Actuator
      summary: Actuator web endpoint 'metrics-requiredMetricName'
      operationId: metric
      parameters:
      - name: requiredMetricName
        in: path
        required: true
        schema:
          type: string
      - name: tag
        in: query
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/vnd.spring-boot.actuator.v3+json:
              schema:
                type: object
            application/vnd.spring-boot.actuator.v2+json:
              schema:
                type: object
            application/json:
              schema:
                type: object
        "404":
          description: Not Found
  /actuator/metrics:
    get:
      tags:
      - Actuator
      summary: Actuator web endpoint 'metrics'
      operationId: listNames
      responses:
        "200":
          description: OK
          content:
            application/vnd.spring-boot.actuator.v3+json:
              schema:
                type: object
            application/vnd.spring-boot.actuator.v2+json:
              schema:
                type: object
            application/json:
              schema:
                type: object
  /actuator/health/{path}:
    get:
      tags:
      - Actuator
      summary: Actuator web endpoint 'health-path'
      operationId: health
      parameters:
      - name: path
        in: path
        required: true
        schema:
          type: array
          items:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/vnd.spring-boot.actuator.v3+json:
              schema:
                type: object
            application/vnd.spring-boot.actuator.v2+json:
              schema:
                type: object
            application/json:
              schema:
                type: object
        "404":
          description: Not Found
  /actuator/health:
    get:
      tags:
      - Actuator
      summary: Actuator web endpoint 'health'
      operationId: health_1
      responses:
        "200":
          description: OK
          content:
            application/vnd.spring-boot.actuator.v3+json:
              schema:
                type: object
            application/vnd.spring-boot.actuator.v2+json:
              schema:
                type: object
            application/json:
              schema:
                type: object
  /actuator:
    get:
      tags:
      - Actuator
      summary: Actuator root web endpoint
      operationId: links
      responses:
        "200":
          description: OK
          content:
            application/vnd.spring-boot.actuator.v3+json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  additionalProperties:
                    $ref: "#/components/schemas/Link"
            application/vnd.spring-boot.actuator.v2+json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  additionalProperties:
                    $ref: "#/components/schemas/Link"
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  additionalProperties:
                    $ref: "#/components/schemas/Link"
  /{version}/devices/{expoPushToken}:
    delete:
      tags:
      - Device Registration
      summary: Explicit unregister (user logout / privacy).
      operationId: unregister
      parameters:
      - name: expoPushToken
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
components:
  schemas:
    ProductResponse:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        merchantId:
          type: string
          format: uuid
        branchId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        unitPrice:
          type: number
        imageUrl:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - active
      - createdAt
      - merchantId
      - name
      - productId
      - unitPrice
      - updatedAt
    SetMerchantLocationRequest:
      type: object
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        geofenceRadiusMeters:
          type: integer
          format: int32
        googlePlaceId:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string
      required:
      - geofenceRadiusMeters
      - latitude
      - longitude
    MerchantLocationResponse:
      type: object
      properties:
        merchantId:
          type: string
          format: uuid
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        geofenceRadiusMeters:
          type: integer
          format: int32
        googlePlaceId:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string
        placeFormattedAddress:
          type: string
        placeRating:
          type: number
          format: double
        placeReviewCount:
          type: integer
          format: int32
        placeEnrichmentStatus:
          type: string
        placeEnrichedAt:
          type: string
          format: date-time
      required:
      - geofenceRadiusMeters
      - latitude
      - longitude
      - merchantId
    SetLogoRequest:
      type: object
      properties:
        storageKey:
          type: string
      required:
      - storageKey
    MerchantSummary:
      type: object
      properties:
        applicationId:
          type: string
          format: uuid
        applicationReference:
          type: string
        registrationNumber:
          type: string
        status:
          type: string
          enum:
          - DRAFT
          - SUBMITTED
          - VERIFICATION
          - SCREENING
          - RISK_REVIEW
          - DECISION_PENDING
          - SETUP
          - ACTIVE
          - MONITORING
          - ACTION_REQUIRED
          - REJECTED
        submittedAt:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time
        logoStorageKey:
          type: string
      required:
      - applicationId
      - applicationReference
      - lastUpdatedAt
      - registrationNumber
      - status
    CreateIntentRequest:
      type: object
      properties:
        amount:
          type: number
          format: double
        currency:
          type: string
        merchantId:
          type: string
          format: uuid
        branchId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
    PaymentRequested:
      type: object
      properties:
        paymentRequestId:
          type: string
          format: uuid
        orderId:
          type: string
        amountMinorUnits:
          type: integer
          format: int64
        currency:
          type: string
        userDisplayName:
          type: string
        redirectReturnUri:
          type: string
      required:
      - amountMinorUnits
      - currency
      - orderId
      - redirectReturnUri
      - userDisplayName
    ClientTokenRequest:
      type: object
      properties:
        merchantId:
          type: string
          format: uuid
        branchId:
          type: string
          format: uuid
    CheckoutRequest:
      type: object
      properties:
        nonce:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
        invoiceId:
          type: string
        merchantId:
          type: string
          format: uuid
        branchId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
    CreateBranchRequest:
      type: object
      properties:
        name:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        geofenceRadiusMeters:
          type: integer
          format: int32
        googlePlaceId:
          type: string
        stripeSecretKey:
          type: string
        stripePublishableKey:
          type: string
        braintreeMerchantId:
          type: string
        braintreePublicKey:
          type: string
        braintreePrivateKey:
          type: string
        braintreeEnvironment:
          type: string
      required:
      - name
    CreateMerchantRequest:
      type: object
      properties:
        legalBusinessName:
          type: string
        businessType:
          type: string
        registrationNumber:
          type: string
        operatingCountry:
          type: string
        primaryBusinessAddress:
          type: string
        contactFullName:
          type: string
        contactEmail:
          type: string
        contactPhoneNumber:
          type: string
      required:
      - businessType
      - contactEmail
      - contactFullName
      - contactPhoneNumber
      - legalBusinessName
      - operatingCountry
      - primaryBusinessAddress
      - registrationNumber
    BankAccountData:
      type: object
      properties:
        bankName:
          type: string
        iban:
          type: string
        bic:
          type: string
      required:
      - bankName
      - bic
      - iban
    InvoiceData:
      type: object
      properties:
        invoiceNumber:
          type: string
        issueDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        seller:
          $ref: "#/components/schemas/TradePartyData"
        buyer:
          $ref: "#/components/schemas/TradePartyData"
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceLineItem"
        currency:
          type: string
        bankAccount:
          $ref: "#/components/schemas/BankAccountData"
        footerText:
          type: string
        logoBase64:
          type: string
      required:
      - buyer
      - currency
      - dueDate
      - invoiceNumber
      - issueDate
      - lineItems
      - seller
    InvoiceLineItem:
