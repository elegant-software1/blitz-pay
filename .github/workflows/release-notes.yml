name: Release Notes (on main branch merge)

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  release-notes:
    if: ${{ github.event.pull_request.merged == true }}
    uses: medimohammadise/elegant-ci-cd-pipeline/.github/workflows/release-notes.yml@main
