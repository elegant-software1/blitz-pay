name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Docker image tag to deploy (e.g. v0.2.2)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    # Self-hosted runner must have kubectl, helm, and ~/.kube/config pre-configured
    # for the kind cluster on myserver. See reference/RUNNER_SETUP.md.
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    env:
      HELM_CHART: ./helm/blitz-pay
      ENV_SUFFIX: ${{ inputs.environment == 'production' && 'prod' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify cluster connectivity
        run: kubectl cluster-info --request-timeout=10s

      - name: Deploy to ${{ inputs.environment }}
        run: |
          helm upgrade --install blitz-pay $HELM_CHART \
            --namespace blitzpay-$ENV_SUFFIX \
            --create-namespace \
            --values $HELM_CHART/values.yaml \
            --values $HELM_CHART/values-$ENV_SUFFIX.yaml \
            --set image.tag=${{ inputs.image-tag }} \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/blitzpay \
            --namespace blitzpay-$ENV_SUFFIX \
            --timeout=5m
