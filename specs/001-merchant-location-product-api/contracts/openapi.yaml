openapi: 3.0.3
info:
  title: MCP Merchant Location & Product API
  version: '1.0'
paths:
  /v1/branches/{branchId}/locations:
    post:
      summary: Create MerchantLocation for an existing branch
      parameters:
        - name: branchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                addressLine1:
                  type: string
                latitude:
                  type: number
                  format: double
                longitude:
                  type: number
                  format: double
              required: [name]
      responses:
        '201':
          description: Created
        '400':
          description: Validation error
        '404':
          description: Branch not found
  /v1/branches/{branchId}/locations/{locationId}/products:
    post:
      summary: Create Product for a location
      parameters:
        - name: branchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: locationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                priceMinor:
                  type: integer
                currency:
                  type: string
              required: [name, priceMinor, currency]
      responses:
        '201':
          description: Created
        '400':
          description: Validation error
        '404':
          description: Location not found
components: {}
