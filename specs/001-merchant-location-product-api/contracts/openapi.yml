openapi: 3.1.0
info:
  title: MCP Server - Merchant Location & Product API
  version: 0.1.0
servers:
  - url: /v1
paths:
  /branches/{branchId}/locations:
    post:
      summary: Create Merchant Location
      parameters:
        - name: branchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /branches/{branchId}/locations/{locationId}/products:
    post:
      summary: Create Product for Location
      parameters:
        - name: branchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: locationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
  /branches/{branchId}/locations/{locationId}:
    patch:
      summary: Patch Merchant Location
      parameters:
        - name: branchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: locationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationPatch'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '412':
          description: Precondition Failed
          $ref: '#/components/responses/PreconditionFailed'
  /branches/{branchId}/products/{productId}:
    patch:
      summary: Patch Product
      parameters:
        - name: branchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductPatch'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
components:
  schemas:
    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        postcode:
          type: string
        country:
          type: string
      required: [street, city, postcode, country]
    LocationCreate:
      type: object
      properties:
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        phone:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        googlePlaceId:
          type: string
      required: [name, address]
    LocationPatch:
      type: object
      properties:
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        phone:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        version:
          type: integer
    LocationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        branchId:
          type: string
          format: uuid
        name:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        phone:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
    ProductCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        priceMinor:
          type: integer
        currency:
          type: string
        available:
          type: boolean
      required: [name, priceMinor, currency]
    ProductPatch:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        priceMinor:
          type: integer
        currency:
          type: string
        available:
          type: boolean
        version:
          type: integer
    ProductResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        branchId:
          type: string
          format: uuid
        locationId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        priceMinor:
          type: integer
        currency:
          type: string
        available:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
    PreconditionFailed:
      description: Precondition failed (version mismatch)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
