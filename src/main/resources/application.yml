spring:
  application:
    name: quickpay
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/quickpay_db}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 10
      auto-commit: true
      pool-name: HikariPool-1
      connection-init-sql: "SET search_path TO blitzpay, public"
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate.connection.isolation: 2
      hibernate:
        default_schema: blitzpay
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    default-schema: blitzpay
    liquibase-schema: public
  threads:
    virtual:
      enabled: true
  ai:
    mcp:
      server:
        enabled: true
        name: blitzpay-mcp
        version: 1.0.0
        protocol: STREAMABLE
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:llama3.2}
        options:
          temperature: 0.1
          num-predict: 256

server:
  tomcat:
    max-threads: 50
management:
  endpoints:
    web:
      exposure:
        include: metrics,health
  endpoint:
    metrics:
      enabled: true
springdoc:
  api-docs:
    path: /api-docs
  show-actuator: true
api:
  default-version: 1
  versions:
    invoice: 1
    qrpay: 1
    truelayer: 1
    payments: 1
    merchant: 1
    voice: 1

truelayer:
  apiBase: ${TRUELAYER_API_BASE:https://api.truelayer-sandbox.com}
  accessToken: ${TRUELAYER_ACCESS_TOKEN:dummy-access-token}
  webhookJku: ${TRUELAYER_WEBHOOK_JKU:http://localhost:8080/.well-known/jwks.json}
  # SDK configuration
  clientId: ${TRUELAYER_CLIENT_ID}
  clientSecret: ${TRUELAYER_CLIENT_SECRET}
  keyId: ${TRUELAYER_KEY_ID}
  privateKeyPath: ${TRUELAYER_PRIVATE_KEY_PATH}
  environment: ${TRUELAYER_ENV:sandbox}
  httpLogs: ${TRUELAYER_HTTP_LOGS:false}
  merchantAccountId: ${TRUELAYER_MERCHANT_ACCOUNT_ID}
  webhooks:
    environment: sandbox
    maxSkew: PT60M

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  publishable-key: ${EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY:}

braintree:
  merchant-id: ${BRAINTREE_MERCHANT_ID:}
  public-key: ${BRAINTREE_PUBLIC_KEY:}
  private-key: ${BRAINTREE_PRIVATE_KEY:}
  environment: ${BRAINTREE_ENVIRONMENT:sandbox}

blitzpay:
  openapi:
    primary-group-label: Invoice
    groups:
      invoice:
        label: Invoice
      qrpay:
        label: Payments - QRPay
      truelayer:
        label: Payments - TrueLayer
      support:
        label: Support
      general:
        label: Payments - General
      push-notifications:
        label: Payments - Push Notifications
      stripe:
        label: Payments - Stripe
      braintree:
        label: Payments - Braintree
      mobile-geofencing:
        label: Mobile-Geofencing
      merchant:
        label: Operations-Merchant
      voice:
        label: Voice
      actuator:
        label: Monitoring-Actuator
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:4200}
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
  storage:
    endpoint: ${STORAGE_ENDPOINT:https://minio.elegantsoftware.de}
    region: ${STORAGE_REGION:us-east-1}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:Halil@avina4410}
    bucket: ${STORAGE_BUCKET:blitzpay}
    path-style-access: ${STORAGE_PATH_STYLE:true}
  google-maps:
    enabled: ${GOOGLE_MAPS_ENABLED:false}
    api-key: ${GOOGLE_MAPS_API_KEY:}
    base-url: ${GOOGLE_MAPS_BASE_URL:https://maps.googleapis.com}
    enrichment-interval-ms: ${GOOGLE_MAPS_ENRICHMENT_INTERVAL_MS:300000}
    batch-size: ${GOOGLE_MAPS_BATCH_SIZE:50}
  geofence:
    proximity-cooldown-seconds: ${GEOFENCE_PROXIMITY_COOLDOWN_SECONDS:30}
  expo:
    access-token: ${EXPO_ACCESS_TOKEN:}
    base-url: ${EXPO_PUSH_URL:https://exp.host/--/api/v2/push/send}
    receipts-url: ${EXPO_RECEIPTS_URL:https://exp.host/--/api/v2/push/getReceipts}
    request-timeout-ms: ${EXPO_TIMEOUT_MS:10000}
    max-batch-size: ${EXPO_MAX_BATCH:100}
    receipt-delay-minutes: ${EXPO_RECEIPT_DELAY_MIN:15}
  voice:
    enabled: ${VOICE_ENABLED:true}
    max-duration-seconds: ${VOICE_MAX_DURATION_SECONDS:60}
    max-upload-bytes: ${VOICE_MAX_UPLOAD_BYTES:26214400}
    request-timeout-ms: ${VOICE_REQUEST_TIMEOUT_MS:60000}
    accepted-content-types:
      - audio/mpeg
      - audio/mp4
      - audio/webm
      - audio/wav
      - audio/ogg
      - audio/m4a
    whisper:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${WHISPER_BASE_URL:http://localhost:8000/v1}
      model: ${WHISPER_MODEL:whisper-1}
